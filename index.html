<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Style Bot Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0e1621;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: #17212b;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        /* Header */
        .chat-header {
            background: #242f3d;
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #101921;
        }

        .bot-avatar {
            width: 40px;
            height: 40px;
            background: #2b73a5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            margin-right: 12px;
        }

        .bot-info h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .bot-info p {
            font-size: 12px;
            color: #708499;
        }

        /* Chat Box */
        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* Telegram classic pattern */
            background-blend-mode: overlay;
            background-color: #0e1621;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .bot-msg {
            background: #182533;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .user-msg {
            background: #2b5278;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        /* QR Code & Data Styling Inside Chat */
        .qr-card {
            background: #242f3d;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
            text-align: center;
            border: 1px solid #2b394a;
        }

        .qr-card img {
            width: 150px;
            height: 150px;
            margin-top: 8px;
            border-radius: 4px;
            background: white;
            padding: 5px;
        }

        .info-text {
            text-align: left;
            font-size: 14px;
            margin-bottom: 6px;
        }

        /* Bot Inline Buttons */
        .bot-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            align-self: flex-start;
            max-width: 80%;
        }

        .inline-btn {
            background: #24303f;
            color: #64b5f6;
            border: 1px solid #2f3e51;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .inline-btn:hover {
            background: #2f3e51;
        }

        /* Input Area */
        .input-area {
            background: #17212b;
            padding: 12px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #101921;
        }

        .input-area input {
            flex: 1;
            background: #242f3d;
            border: none;
            outline: none;
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
        }

        .input-area button {
            background: #2b73a5;
            color: #fff;
            border: none;
            padding: 0 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .input-area button:hover {
            background: #3682b9;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- Header -->
    <div class="chat-header">
        <div class="bot-avatar">🤖</div>
        <div class="bot-info">
            <h3>Smart QR Bot</h3>
            <p>bot @online</p>
        </div>
    </div>

    <!-- Chat Box -->
    <div class="chat-box" id="chatBox">
        <!-- Messages will appear here dynamically -->
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type /start or a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');

    // --- डेटाबेस (यहाँ अपनी मर्ज़ी से बदलाव करें) ---
    const botData = {
        "plan1": {
            name: "Silver Setup",
            price: "₹199",
            days: "30 Days",
            qrImage: "qr1.png" // अपनी QR इमेज का नाम लिखें
        },
        "plan2": {
            name: "Gold Pro",
            price: "₹499",
            days: "90 Days",
            qrImage: "qr2.png"
        },
        "plan3": {
            name: "VIP Premium",
            price: "₹999",
            days: "365 Days",
            qrImage: "qr3.png"
        }
    };

    // बोट का शुरुआती वेलकम मैसेज
    window.onload = function() {
        showBotWelcome();
    };

    function showBotWelcome() {
        let welcomeText = "नमस्ते! 👋 मैं आपका डिजिटल QR असिस्टेंट बोट हूँ। कृपया नीचे दिए गए प्लान्स में से किसी एक को चुनें या टाइप करें:";
        appendMessage(welcomeText, 'bot');
        
        // बटन दिखाना
        let buttonsHTML = `
            <div class="bot-buttons">
                <button class="inline-btn" onclick="selectPlan('plan1')">🎁 ${botData.plan1.name}</button>
                <button class="inline-btn" onclick="selectPlan('plan2')">🔥 ${botData.plan2.name}</button>
                <button class="inline-btn" onclick="selectPlan('plan3')">👑 ${botData.plan3.name}</button>
            </div>
        `;
        chatBox.innerHTML += buttonsHTML;
        scrollToBottom();
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function sendMessage() {
        let text = userInput.value.trim();
        if (text === "") return;

        appendMessage(text, 'user');
        userInput.value = "";

        // बोट का रिप्लाई लॉजिक
        setTimeout(() => {
            let lowerText = text.toLowerCase();
            
            if (lowerText === '/start' || lowerText === 'hi' || lowerText === 'hello') {
                showBotWelcome();
            } else if (lowerText.includes('silver') || lowerText.includes('199')) {
                selectPlan('plan1');
            } else if (lowerText.includes('gold') || lowerText.includes('499')) {
                selectPlan('plan2');
            } else if (lowerText.includes('vip') || lowerText.includes('999')) {
                selectPlan('plan3');
            } else {
                appendMessage("❌ माफ़ कीजिये, मुझे यह समझ नहीं आया। कृपया नीचे दिए गए बटन का उपयोग करें या /start टाइप करें।", 'bot');
                showBotWelcome();
            }
        }, 600);
    }

    function selectPlan(planKey) {
        let plan = botData[planKey];
        appendMessage(`आपने <b>${plan.name}</b> चुना है। यहाँ इसकी पूरी जानकारी है:`, 'bot');

        // QR कोड और प्लान डिटेल्स कार्ड बनाना
        let cardHTML = `
            <div class="message bot-msg">
                <div class="qr-card">
                    <div class="info-text"><b>Name:</b> ${plan.name}</div>
                    <div class="info-text"><b>Price:</b> <span style="color: #4caf50; font-weight: bold;">${plan.price}</span></div>
                    <div class="info-text"><b>Validity:</b> ${plan.days}</div>
                    <div class="info-text" style="margin-top: 8px; font-size: 12px; color: #aaa;">स्कैन करके पेमेंट करें:</div>
                    <img src="${plan.qrImage}" alt="QR Code">
                </div>
            </div>
        `;
        
        setTimeout(() => {
            chatBox.innerHTML += cardHTML;
            scrollToBottom();
        }, 400);
    }

    function appendMessage(text, sender) {
        let msgDiv = document.createElement('div');
        msgDiv.classList.add('message');
        msgDiv.classList.add(sender === 'user' ? 'user-msg' : 'bot-msg');
        msgDiv.innerHTML = text;
        chatBox.appendChild(msgDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
  </html>
